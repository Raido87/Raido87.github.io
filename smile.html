<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're an idiot!</title>
    <link href="https://i.pinimg.com/736x/ca/fb/dd/cafbdd686129d7d0ee5b5b59f86eece0.jpg" rel="icon">
    <style>
        /* Мигание фона между черным и белым */
        @keyframes blinkBackground {
            0%, 100% { background-color: black; }
            50% { background-color: white; }
        }
        body {
            animation-name: blinkBackground;
            animation-duration: 1s;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Центральное расположение GIF-изображения */
        .gif-container {
            display: block;
            margin: 0 auto;
            width: fit-content;
            text-align: center;
        }
        img {
            width: 400px; /* Размер GIF-изображения */
            box-shadow: 0 0 10px rgba(0,0,0,.5);
        }
        /* Красный дрожащий текст */
        .shake-text {
            font-size: 3rem; /* Большой размер шрифта */
            color: red;
            font-weight: bold;
            animation: shake 0.8s infinite; /* Бесконечная анимация дрожания */
        }
        /* Ключевые кадры для эффекта дрожания */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(10px); }
            50% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <!-- GIF-изображение в центре страницы -->
    <div class="gif-container">
        <img src="https://psv4.userapi.com/s/v1/d2/DyFv3rIBxdj1_qBpwHB8KZr4JCYSkYCJX1Uq20dHoBZZVRXoLkWe_JByhBCJpHQXK__PYjTmWTnolxsYXEXYcmFGrJjqljESYIJDzVQTHov0QtQv9DFnAQlT_e_hr1nfpEih1RgiCNU5/5a194cf766a909fab236a092bebbc7fc.png" alt="smail">
        <!-- Дрожащий красный текст -->
        <h2 class="shake-text">Come in! It's time to play!</h2>
    </div>


</body>
</html>
