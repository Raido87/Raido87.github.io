<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт с мигающим фоном</title>
    <style>
        /* Мигание фона между черным и белым */
        @keyframes blinkBackground {
            0%, 100% { background-color: black; }
            50% { background-color: white; }
        }
        body {
            animation-name: blinkBackground;
            animation-duration: 1s;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Центральное расположение GIF-изображения */
        .gif-container {
            display: block;
            margin: 0 auto;
            width: fit-content;
        }
        img {
            width: 400px; /* Размер GIF-изображения */
            box-shadow: 0 0 10px rgba(0,0,0,.5);
        }
    </style>
</head>
<body>
    <!-- GIF-изображение в центре страницы -->
    <div class="gif-container">
        <img src="YOUR_GIF_URL_HERE.gif" alt="Анимированная GIF-картинка">
    </div>

    <!-- Автоматически играющая музыка (без возможности отключения) -->
    <audio autoplay loop muted playsinline>
        <source src="YOUR_MUSIC_FILE.mp3" type="audio/mp3">
        Ваш браузер не поддерживает тег audio.
    </audio>
</body>
</html>
