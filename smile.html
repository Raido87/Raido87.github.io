<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're an idiot!</title>
    <link href="https://i.pinimg.com/736x/ca/fb/dd/cafbdd686129d7d0ee5b5b59f86eece0.jpg" rel="icon">
    <style>
        /* Мигание фона между черным и белым */
        @keyframes blinkBackground {
            0%, 100% { background-color: black; }
            50% { background-color: white; }
        }
        body {
            animation-name: blinkBackground;
            animation-duration: 1s;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Центральное расположение GIF-изображения */
        .gif-container {
            display: block;
            margin: 0 auto;
            width: fit-content;
        }
        img {
            width: 400px; /* Размер GIF-изображения */
            box-shadow: 0 0 10px rgba(0,0,0,.5);
        }
    </style>
</head>
<body>
    <!-- GIF-изображение в центре страницы -->
    <div class="gif-container">
        <img src="https://vk.com/doc609282845_697421540?hash=rvKzmLeZzFVlCQ8U4drEZ4wSbX79kWE552UIrHzMc7H&dl=w4zTbgPd4jhVfcBwoRNEZC5zqll9ZUBNfkug2ftGWmD&api=1&no_preview=1" alt="smail">
    </div>

    <!-- Автоматически играющая музыка (без возможности отключения) -->

</body>
</html>
